<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Priao Catalog — Excel → JSON Converter</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Noto Sans Thai",sans-serif}
body{background:#f4f8fc;color:#0a1628;padding:20px;max-width:900px;margin:0 auto}
h1{color:#25a9e0;margin-bottom:4px}
.sub{color:#4e9ecf;font-size:.85rem;margin-bottom:20px}
.drop{border:3px dashed #b8d9f0;border-radius:14px;padding:50px 20px;text-align:center;background:#fff;cursor:pointer;transition:all .15s;margin-bottom:20px}
.drop.over{border-color:#25a9e0;background:#e6f1fb;transform:scale(1.01)}
.drop-icon{font-size:3rem;color:#b8d9f0;margin-bottom:10px}
.drop-title{font-size:1.1rem;font-weight:700;color:#231f20;margin-bottom:6px}
.drop-hint{font-size:.85rem;color:#4e9ecf}
.drop input{display:none}
.btn{background:linear-gradient(135deg,#25a9e0,#0065a8);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:14px;transition:all .15s}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(32,128,190,.35)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn.alt{background:#fff;color:#25a9e0;border:2px solid #25a9e0}
.status{background:#fff;border:1.5px solid #b8d9f0;border-radius:10px;padding:16px;margin-bottom:16px;display:none}
.status.show{display:block}
.status h3{color:#25a9e0;font-size:1rem;margin-bottom:10px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.stat{background:#f4f8fc;padding:10px;border-radius:8px;text-align:center}
.stat-num{font-size:1.4rem;font-weight:800;color:#25a9e0}
.stat-lbl{font-size:.72rem;color:#4e9ecf;margin-top:2px}
.cat-table{width:100%;border-collapse:collapse;font-size:.85rem;margin-bottom:14px}
.cat-table th,.cat-table td{padding:6px 10px;text-align:left;border-bottom:1px solid #ecf3f8}
.cat-table th{background:#f4f8fc;color:#0065a8;font-weight:700}
.cat-table td.num{text-align:right;font-variant-numeric:tabular-nums}
.warns{max-height:280px;overflow-y:auto;background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:10px;font-size:.78rem;line-height:1.5}
.warns .item{padding:4px 0;border-bottom:1px dashed #ffe082;color:#7c5e00}
.warns .item:last-child{border:none}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.muted{color:#4e9ecf;font-size:.8rem;margin-top:8px}
.error{background:#ffebee;color:#c62828;padding:10px;border-radius:8px;margin-bottom:14px}
.file-preview{padding:14px;background:#e6f1fb;border:1.5px solid #b8d9f0;border-radius:10px;display:flex;align-items:center;gap:14px;margin-bottom:14px}
.file-preview-icon{font-size:2.2rem}
.file-preview-name{font-weight:700;color:#0a1628;margin-bottom:2px;word-break:break-all}
.file-preview-meta{font-size:.78rem;color:#4e9ecf}
#progress-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,22,40,.55);display:flex;align-items:center;justify-content:center;z-index:9999;animation:fadeIn .2s}
.progress-modal{background:#fff;border-radius:14px;padding:24px;width:90%;max-width:460px;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.progress-title{font-size:1.1rem;font-weight:800;color:#0a1628;margin-bottom:16px}
.progress-bar-wrap{height:12px;background:#e6f1fb;border-radius:6px;overflow:hidden;margin-bottom:6px}
.progress-bar-fill{height:100%;background:linear-gradient(135deg,#25a9e0,#0065a8);transition:width .35s;border-radius:6px}
.progress-percent{font-size:.78rem;color:#0065a8;font-weight:700;text-align:right;margin-bottom:14px}
.progress-steps{max-height:200px;overflow-y:auto;font-size:.85rem;color:#0a1628;line-height:1.9}
.progress-steps .step{padding:2px 0;display:flex;align-items:center;gap:8px}
.progress-steps .step.done{color:#1D9E75}
.progress-steps .step.active{color:#0065a8;font-weight:700}
.progress-steps .step .icon{display:inline-block;width:18px;text-align:center}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #b8d9f0;border-top-color:#25a9e0;border-radius:50%;animation:spin .8s linear infinite;vertical-align:-3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.text-url-warn{background:#fff3cd;border:1px solid #ffc107;color:#856404;padding:8px 12px;border-radius:8px;font-size:.78rem;margin-bottom:10px}
</style>
</head>
<body>

<h1>🔄 Excel → JSON Converter</h1>
<p class="sub">แปลงไฟล์ <code>ไฟล์อัพโหลดสินค้าเข้า Catalog Wholesale.xlsx</code> เป็น JSON พร้อมอัปเข้า GitHub</p>

<div style="background:#fff;border:1.5px solid #b8d9f0;border-radius:14px;padding:16px;margin-bottom:18px">
  <div style="font-size:.95rem;font-weight:800;color:#0a1628;margin-bottom:4px">📥 ก่อนใช้งาน — ดาวน์โหลด Template</div>
  <div style="font-size:.78rem;color:#4e9ecf;margin-bottom:12px">เลือก Template เปล่า (สำหรับเริ่มใหม่) หรือ ข้อมูลปัจจุบัน (สำหรับแก้ไขข้อมูลล่าสุด)</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <button class="btn" onclick="downloadEmptyTemplate()" style="margin-top:0">⬇ Template เปล่า</button>
    <button class="btn alt" onclick="downloadCurrentData()" style="margin-top:0">⬇ ข้อมูลปัจจุบัน (จาก GitHub)</button>
  </div>
  <div id="dl-status" style="font-size:.72rem;color:#4e9ecf;margin-top:8px;min-height:1em"></div>
</div>

<div class="drop" id="drop">
  <div class="drop-icon">📁</div>
  <div class="drop-title">ลาก Excel มาวางที่นี่</div>
  <div class="drop-hint">หรือคลิกเพื่อเลือกไฟล์ (.xlsx)</div>
  <input type="file" id="fileInput" accept=".xlsx,.xls">
  <button class="btn" onclick="document.getElementById('fileInput').click()">เลือกไฟล์</button>
</div>

<div class="status" id="status"></div>

<script>
'use strict';

// ====== Configuration (sync กับ convert.py) ======
const CATEGORY_MAP = {
  "เครื่องสำอาง":         "C01",
  "ผลิตภัณฑ์ดูแลผิวหน้า": "C02",
  "ผลิตภัณฑ์ดูแลผิวกาย":  "C03",
  "ผลิตภัณฑ์ดูแลเส้นผม":  "C04",
  "น้ำหอม":              "C05",
  "อุปกรณ์เพื่อความงาม":  "C06",
  "อาหารเสริม":          "C07",
  "คอนซูเมอร์":          "C08",
  "แฟชั่น&ไลฟ์สไตล์":    "C09"
};
const STATUS_FLAG_MAP = {"A": 1, "New": 2, "B": 3};
const COL = {
  category: 0, subcategory: 1, barcode: 2, name: 3,
  pack_qty: 4, unit: 5, brand: 6, psale: 7, tag: 8,
  price: 9, stock: 10, image: 11,
  promo_type: 12, promo_label: 13, orig_price: 14
};
const DATA_START_ROW = 4; // 1-based; row 3 = header

// ====== UI helpers ======
const $status = document.getElementById("status");
const $drop   = document.getElementById("drop");
const $input  = document.getElementById("fileInput");

function setStatus(html) {
  $status.innerHTML = html;
  $status.classList.add("show");
}
function showError(msg) {
  setStatus(`<div class="error"><strong>❌ Error:</strong> ${msg}</div>`);
}

// ====== Download Template / Current Data ======
const TEMPLATE_HEADERS = ['หมวดสินค้า','หมวดย่อยสินค้า','รหัสสินค้า','ชื่อสินค้า','จำนวน/หน่วย','หน่วย','แบรนด์','PSaleStatus','Tag','price_wholesale','OnStockFG','ลิงก์รูปภาพ','promo_type','promo_label','original_price'];
const CAT_REVERSE = {};
for (const [name, code] of Object.entries(CATEGORY_MAP)) CAT_REVERSE[code] = name;
const FLAG_REVERSE = {1:'A', 2:'New', 3:'B'};

function dlStatus(msg, isError) {
  const el = document.getElementById('dl-status');
  el.textContent = msg || '';
  el.style.color = isError ? '#dc2626' : '#1D9E75';
}

function makeTemplateSheet(rows) {
  const data = [
    ['ไฟล์อัพโหลดสินค้าเข้า Catalog Wholesale  |  PSaleStatus: New, A, B  |  ' + (rows.length ? 'ข้อมูลล่าสุด' : 'Template เปล่า')],
    ['เติมข้อมูลจากแถวที่ 4 ลงมา  |  ลิงก์รูป: คลิกขวาที่เซลล์ → Link → ใส่ URL  |  วันที่: ' + new Date().toLocaleDateString('th-TH')],
    TEMPLATE_HEADERS,
    ...rows
  ];
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:20},{wch:32},{wch:18},{wch:52},{wch:10},{wch:8},{wch:26},{wch:12},{wch:18},{wch:12},{wch:10},{wch:18},{wch:14},{wch:30},{wch:14}];
  ws['!merges'] = [
    {s:{r:0,c:0},e:{r:0,c:14}},
    {s:{r:1,c:0},e:{r:1,c:14}}
  ];
  return ws;
}

function downloadEmptyTemplate() {
  dlStatus('กำลังสร้าง Template เปล่า...');
  try {
    const examples = [
      ['เครื่องสำอาง','ลิป','8850080754278','ตัวอย่างสินค้าปกติ — ลบทิ้งได้',1,'แท่ง','BRAND-EN ชื่อแบรนด์ไทย','A','สินค้าขายดี',43,28,'','','',''],
      ['ผลิตภัณฑ์ดูแลผิวหน้า','ครีม','8857127482897','ตัวอย่างสินค้า SALE — ลบทิ้งได้',1,'หลอด','BRAND2-EN ชื่อแบรนด์ไทย2','A','สินค้าขายดี',100,10,'','sale','🔥 SALE — ลด 30%',150],
      ['น้ำหอม','น้ำหอม','8859214800874','ตัวอย่างสินค้า BUNDLE — ลบทิ้งได้',6,'กล่อง','BRAND3-EN ชื่อแบรนด์ไทย3','A','',675,3,'','bundle','🎁 ซื้อ 1 แถม 1',0],
      ['คอนซูเมอร์','แชมพู','8859214800999','ตัวอย่างสินค้า FLASH — ลบทิ้งได้',1,'ขวด','BRAND4-EN ชื่อแบรนด์ไทย4','New','สินค้าใหม่',125,5,'','flash','⚡ FLASH SALE — เหลือ 24 ชม.',250]
    ];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, makeTemplateSheet(examples), 'สินค้าทั้งหมด');
    const today = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, 'Catalog_Template_เปล่า_' + today + '.xlsx');
    dlStatus('✓ ดาวน์โหลด Template เปล่าเรียบร้อย');
  } catch (e) {
    console.error(e);
    dlStatus('สร้างไฟล์ไม่สำเร็จ: ' + e.message, true);
  }
}

async function downloadCurrentData() {
  dlStatus('กำลังโหลดข้อมูลล่าสุดจาก GitHub Pages...');
  const baseUrl = 'https://priaowhosale.github.io/Whosale_Catalogs';
  try {
    const idx = await fetch(baseUrl + '/data/index.json').then(r => {
      if (!r.ok) throw new Error('โหลด index.json ไม่สำเร็จ');
      return r.json();
    });
    const rows = [];
    for (const catCode of idx.categories) {
      const items = await fetch(baseUrl + '/data/' + catCode + '.json').then(r => r.json());
      const catName = CAT_REVERSE[catCode] || catCode;
      items.forEach(item => {
        const packLabel = String(item[9] || '');
        const unit = packLabel.includes(' / ') ? packLabel.split(' / ')[1].trim() : '';
        rows.push([
          catName, item[2] || '', item[0] || '', item[1] || '',
          item[8] || 1, unit || 'ชิ้น', item[7] || '',
          FLAG_REVERSE[item[10]] || 'B', item[3] || '',
          item[4] || 0, item[5] || 0, item[6] || '',
          item[11] || '', item[12] || '', item[13] || ''
        ]);
      });
      dlStatus('โหลด ' + catCode + ' (' + items.length + ' รายการ)... ');
    }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, makeTemplateSheet(rows), 'สินค้าทั้งหมด');
    const today = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, 'Catalog_ข้อมูลล่าสุด_' + today + '.xlsx');
    dlStatus('✓ ดาวน์โหลดเรียบร้อย — ' + rows.length.toLocaleString() + ' รายการ');
  } catch (e) {
    console.error(e);
    dlStatus('โหลดไม่สำเร็จ: ' + e.message + ' (ตรวจ network / GitHub Pages พร้อมไหม)', true);
  }
}

// ====== Drag & drop — show preview, wait for Convert button ======
let pendingFile = null;

["dragover","dragenter"].forEach(e => $drop.addEventListener(e, ev => {
  ev.preventDefault(); $drop.classList.add("over");
}));
["dragleave","drop"].forEach(e => $drop.addEventListener(e, ev => {
  ev.preventDefault(); $drop.classList.remove("over");
}));
$drop.addEventListener("drop", ev => {
  if (ev.dataTransfer.files.length) prepareFile(ev.dataTransfer.files[0]);
});
$input.addEventListener("change", ev => {
  if (ev.target.files.length) prepareFile(ev.target.files[0]);
});

function prepareFile(file) {
  if (!file.name.match(/\.xlsx?$/i)) {
    return showError("กรุณาเลือกไฟล์ .xlsx หรือ .xls");
  }
  pendingFile = file;
  const sizeKB = (file.size / 1024).toFixed(1);
  setStatus(`
    <div class="file-preview">
      <div class="file-preview-icon">📄</div>
      <div style="flex:1;min-width:0">
        <div class="file-preview-name">${escapeHtml(file.name)}</div>
        <div class="file-preview-meta">ขนาด: ${sizeKB} KB · พร้อมแปลง</div>
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" onclick="startConvert()" style="margin-top:0">🔄 Convert</button>
      <button class="btn alt" onclick="cancelFile()" style="margin-top:0">ยกเลิก</button>
    </div>
  `);
}

function cancelFile() {
  pendingFile = null;
  $status.classList.remove("show");
  $status.innerHTML = "";
  $input.value = "";
}

// ====== Convert with progress modal ======
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function startConvert() {
  if (!pendingFile) return;
  const file = pendingFile;
  const startTime = Date.now();

  openProgressModal();

  try {
    updateProgress(1, 5, "อ่านไฟล์ Excel", "loading");
    await sleep(120);
    const buf = await file.arrayBuffer();
    completeStep(1);

    updateProgress(2, 5, "ตรวจ structure + parsing", "loading");
    await sleep(180);
    const wb = XLSX.read(buf, { cellHTML: false });
    const wsName = wb.SheetNames[0];
    const ws = wb.Sheets[wsName];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: true });
    completeStep(2);

    updateProgress(3, 5, `แปลง ${rows.length.toLocaleString()} แถว`, "loading");
    await sleep(200);
    const result = convertRows(rows, ws);
    completeStep(3);

    updateProgress(4, 5, `ตรวจ hyperlinks (${result.textUrlCount} text URL fallback)`, "loading");
    await sleep(150);
    completeStep(4);

    updateProgress(5, 5, `สร้างผลลัพธ์ — ${result.total.toLocaleString()} รายการ`, "loading");
    await sleep(200);
    completeStep(5);

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    await sleep(300);
    closeProgressModal();
    renderResult(result, file.name, elapsed);
    pendingFile = null;
  } catch (err) {
    closeProgressModal();
    console.error(err);
    showError(err.message || String(err));
  }
}

function openProgressModal() {
  const overlay = document.createElement('div');
  overlay.id = 'progress-overlay';
  overlay.innerHTML = `
    <div class="progress-modal">
      <div class="progress-title">🔄 กำลังแปลงไฟล์ — กรุณารอ</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-percent" id="progress-percent">0%</div>
      <div class="progress-steps" id="progress-steps"></div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function updateProgress(cur, total, msg, state) {
  const pct = Math.round((cur / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-percent').textContent = pct + '% · ขั้นที่ ' + cur + '/' + total;
  const steps = document.getElementById('progress-steps');
  const icon = state === 'loading' ? '<span class="spinner"></span>' : '✓';
  const cls = state === 'loading' ? 'active' : 'done';
  const html = `<div class="step ${cls}" data-step="${cur}"><span class="icon">${icon}</span><span>[${cur}/${total}] ${escapeHtml(msg)}</span></div>`;
  steps.insertAdjacentHTML('beforeend', html);
}

function completeStep(stepNum) {
  const el = document.querySelector(`.progress-steps .step[data-step="${stepNum}"]`);
  if (el) {
    el.classList.remove('active');
    el.classList.add('done');
    const icon = el.querySelector('.icon');
    if (icon) icon.textContent = '✓';
  }
}

function closeProgressModal() {
  const overlay = document.getElementById('progress-overlay');
  if (overlay) overlay.remove();
}

// ====== Core conversion logic ======
function convertRows(rows, ws) {
  const byCategory = {};
  Object.values(CATEGORY_MAP).forEach(c => byCategory[c] = []);

  const warnings = [];
  const newBrands = new Set();
  const seenBarcodes = new Set();
  let skipped = 0, autoFixedStock = 0, textUrlCount = 0;

  for (let rIdx = DATA_START_ROW - 1; rIdx < rows.length; rIdx++) {
    const row = rows[rIdx];
    if (!row || !row[COL.category]) { skipped++; continue; }

    const catName = String(row[COL.category]).trim();
    if (!(catName in CATEGORY_MAP)) {
      if (catName && !catName.includes("รวมทั้งหมด")) {
        warnings.push(`Row ${rIdx+1}: ข้ามแถวที่หมวดสินค้า='${catName}' (ไม่อยู่ใน mapping)`);
      }
      skipped++; continue;
    }
    const catCode = CATEGORY_MAP[catName];

    const barcode = String(row[COL.barcode] || "").trim();
    if (!barcode) {
      warnings.push(`Row ${rIdx+1}: ไม่มีรหัสสินค้า ข้าม`);
      skipped++; continue;
    }
    if (seenBarcodes.has(barcode)) {
      warnings.push(`Row ${rIdx+1}: barcode '${barcode}' ซ้ำ (เก็บอันแรก)`);
      continue;
    }
    seenBarcodes.add(barcode);

    const name      = String(row[COL.name] || "").trim();
    const subcat    = String(row[COL.subcategory] || "").trim();
    const packQty   = toInt(row[COL.pack_qty], 1);
    const unit      = String(row[COL.unit] || "").trim() || "ชิ้น";
    const brand     = String(row[COL.brand] || "").trim();
    const psale     = String(row[COL.psale] || "").trim();
    let   tag       = String(row[COL.tag] || "").trim();
    const price     = toNum(row[COL.price], 0);
    const stock     = toInt(row[COL.stock], 0);

    // Image URL — รองรับ 3 รูปแบบ:
    //   1. Hyperlink object (Ctrl+K)        → cell.l.Target   ← preferred
    //   2. Text URL "https://example.com"   → cell.v          ← fallback
    //   3. Text URL "www.example.com"       → +https:// auto  ← fallback
    const cellRef = XLSX.utils.encode_cell({ r: rIdx, c: COL.image });
    const cell = ws[cellRef];
    let imageUrl = "";
    if (cell) {
      if (cell.l && cell.l.Target) {
        imageUrl = String(cell.l.Target).trim();
      } else if (cell.v != null) {
        const v = String(cell.v).trim();
        if (/^https?:\/\//i.test(v)) {
          imageUrl = v;
          textUrlCount++;
          warnings.push(`Row ${rIdx+1}: ลิงก์รูปเป็น text (ไม่ใช่ hyperlink) → ใช้ได้แต่แนะนำให้ Ctrl+K`);
        } else if (/^www\./i.test(v)) {
          imageUrl = 'https://' + v;
          textUrlCount++;
          warnings.push(`Row ${rIdx+1}: ลิงก์รูปไม่มี protocol "${v}" → เติม https:// ให้`);
        }
      }
    }

    // Auto-override tag เมื่อ stock=0
    if (stock <= 0 && tag !== "สินค้าหมดชั่วคราว") {
      if (tag) warnings.push(`Row ${rIdx+1}: barcode=${barcode} stock=0 แต่ Tag='${tag}' → auto-override`);
      tag = "สินค้าหมดชั่วคราว";
      autoFixedStock++;
    }

    // PSaleStatus → flag
    let flag = STATUS_FLAG_MAP[psale];
    if (flag === undefined) {
      warnings.push(`Row ${rIdx+1}: PSaleStatus='${psale}' ไม่รู้จัก (ใช้ flag=3 default)`);
      flag = 3;
    }

    // brand check
    if (brand) {
      const slug = brand.split(/\s+/)[0].replace(/[^A-Za-z0-9]/g, "").toUpperCase();
      newBrands.add(`${brand} → ${slug}`);
    }

    // Promo fields (optional)
    const promoTypeRaw = String(row[COL.promo_type] || '').toLowerCase().trim();
    const promoType = ['sale','bundle','flash'].indexOf(promoTypeRaw) >= 0 ? promoTypeRaw : '';
    const promoLabel = String(row[COL.promo_label] || '').trim();
    const origPrice = toNum(row[COL.orig_price], 0);

    const baseRow = [
      barcode, name, subcat, tag, price, stock, imageUrl, brand, packQty, `${packQty} / ${unit}`, flag
    ];
    if (promoType || promoLabel || origPrice) {
      baseRow.push(promoType, promoLabel, origPrice);
    }
    byCategory[catCode].push(baseRow);
  }

  return { byCategory, warnings, newBrands: Array.from(newBrands).sort(),
           skipped, autoFixedStock, textUrlCount,
           total: Object.values(byCategory).reduce((s,a) => s + a.length, 0) };
}

function toInt(v, def) {
  if (v === "" || v === null || v === undefined) return def;
  const n = parseFloat(v);
  return isFinite(n) ? Math.trunc(n) : def;
}
function toNum(v, def) {
  if (v === "" || v === null || v === undefined) return def;
  const n = parseFloat(v);
  if (!isFinite(n)) return def;
  return Number.isInteger(n) ? n : n;
}

// ====== Render result + download buttons ======
function renderResult(res, srcName, elapsedSec) {
  const { byCategory, warnings, newBrands, skipped, autoFixedStock, textUrlCount, total } = res;
  const catList = Object.keys(CATEGORY_MAP);

  let html = `<h3>✅ แปลงสำเร็จ — จากไฟล์ <code>${escapeHtml(srcName)}</code>${elapsedSec ? ` <span style="font-size:.78rem;color:#4e9ecf;font-weight:600">· ${elapsedSec} วินาที</span>` : ''}</h3>`;

  if (textUrlCount > 0) {
    html += `<div class="text-url-warn">⚠ พบลิงก์รูปแบบ text URL ${textUrlCount} รายการ → ใช้ได้แต่แนะนำให้ใส่เป็น hyperlink (Ctrl+K) เพื่อให้ Excel เปิดดูได้สะดวกกว่า</div>`;
  }

  html += `
    <div class="stat-grid">
      <div class="stat"><div class="stat-num">${total.toLocaleString()}</div><div class="stat-lbl">รายการรวม</div></div>
      <div class="stat"><div class="stat-num">${catList.length}</div><div class="stat-lbl">หมวดสินค้า</div></div>
      <div class="stat"><div class="stat-num">${autoFixedStock.toLocaleString()}</div><div class="stat-lbl">Auto-fix stock=0</div></div>
      <div class="stat"><div class="stat-num">${warnings.length.toLocaleString()}</div><div class="stat-lbl">คำเตือน</div></div>
    </div>
    <table class="cat-table">
      <tr><th>หมวดสินค้า</th><th>ไฟล์</th><th class="num">จำนวน</th><th class="num">ดาวน์โหลด</th></tr>`;
  for (const catName of catList) {
    const catCode = CATEGORY_MAP[catName];
    const cnt = byCategory[catCode].length;
    html += `<tr>
      <td>${escapeHtml(catName)}</td>
      <td><code>${catCode}.json</code></td>
      <td class="num">${cnt.toLocaleString()}</td>
      <td class="num"><a href="#" onclick="downloadCat('${catCode}');return false">⬇ JSON</a></td>
    </tr>`;
  }
  html += `</table>
    <div class="actions">
      <button class="btn" onclick="downloadAllZip()">⬇ ดาวน์โหลดทั้งหมด (ZIP)</button>
      <button class="btn alt" onclick="downloadReport()">📄 ดาวน์โหลด report.md</button>
    </div>`;

  if (warnings.length) {
    html += `<h3 style="margin-top:18px">⚠ คำเตือน (${warnings.length})</h3>
      <div class="warns">${warnings.slice(0, 200).map(w => `<div class="item">${escapeHtml(w)}</div>`).join("")}
      ${warnings.length > 200 ? `<div class="item">... และอีก ${warnings.length-200} รายการ</div>` : ""}</div>`;
  }
  if (newBrands.length) {
    html += `<h3 style="margin-top:18px">🏷️ Brand ที่เจอใน Excel (${newBrands.length})</h3>
      <p class="muted">เช็คดูว่ามีไฟล์รูปใน <code>assets/brands/{SLUG}.png/.jpg</code> ครบหรือยัง — ถ้าขาดให้อัปเพิ่ม</p>
      <div class="warns">${newBrands.slice(0,200).map(b => `<div class="item">${escapeHtml(b)}</div>`).join("")}
      ${newBrands.length > 200 ? `<div class="item">... และอีก ${newBrands.length-200}</div>` : ""}</div>`;
  }

  setStatus(html);
  window._result = res;
}

// ====== Download helpers ======
function jsonStr(items) {
  const lines = items.map(item => JSON.stringify(item));
  return "[\n" + lines.join(",\n") + "\n]\n";
}

function downloadCat(catCode) {
  const items = window._result.byCategory[catCode];
  download(`${catCode}.json`, jsonStr(items), "application/json");
}

async function downloadAllZip() {
  const zip = new JSZip();
  const dataFolder = zip.folder("data");
  for (const catCode of Object.values(CATEGORY_MAP)) {
    dataFolder.file(`${catCode}.json`, jsonStr(window._result.byCategory[catCode]));
  }
  dataFolder.file("index.json", JSON.stringify({categories: Object.values(CATEGORY_MAP)}, null, 2));
  dataFolder.file("conversion_report.md", buildReport(window._result));
  const blob = await zip.generateAsync({ type: "blob" });
  download(`catalog-data-${todayStr()}.zip`, blob, "application/zip", true);
}

function downloadReport() {
  download(`conversion_report_${todayStr()}.md`, buildReport(window._result), "text/markdown");
}

function buildReport(res) {
  const lines = [
    "# Conversion Report",
    "",
    `**Date:** ${new Date().toISOString().slice(0,16).replace("T"," ")}`,
    `**Total:** ${res.total.toLocaleString()} รายการ`,
    `**Auto-fix stock=0:** ${res.autoFixedStock}`,
    `**Text URL fallback:** ${res.textUrlCount}`,
    `**Warnings:** ${res.warnings.length}`,
    "",
    "## By category",
  ];
  for (const [name, code] of Object.entries(CATEGORY_MAP)) {
    lines.push(`- **${name}** (${code}): ${res.byCategory[code].length.toLocaleString()}`);
  }
  if (res.warnings.length) {
    lines.push("", `## Warnings (${res.warnings.length})`);
    res.warnings.forEach(w => lines.push(`- ${w}`));
  }
  if (res.newBrands.length) {
    lines.push("", `## Brands found (${res.newBrands.length})`);
    res.newBrands.forEach(b => lines.push(`- ${b}`));
  }
  return lines.join("\n");
}

function download(name, content, mime, isBlob) {
  const blob = isBlob ? content : new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
