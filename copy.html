<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- CSP ปิดชั่วคราว — สาเหตุเดียวกับ index.html (LIFF block)
<meta http-equiv="Content-Security-Policy" content="...">
-->
<meta name="robots" content="noai, noimageai, noindex, nofollow">
<title>คัดลอกออเดอร์ — เปรียว คอสเมติกส์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Noto Sans Thai",sans-serif}
body{background:#f4f8fc;color:#0a1628;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:10px}
.card{background:#fff;border-radius:14px;padding:16px 14px;max-width:480px;width:100%;box-shadow:0 6px 20px rgba(32,128,190,.12);text-align:center}
.icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:22px;font-weight:bold}
.icon.success{background:#e8f8ee;color:#06c755}
.icon.warn{background:#fef3c7;color:#d97706}
.icon.error{background:#fee2e2;color:#dc2626}
.icon.ready{background:#e6f1fb;color:#2080BE}
h1{font-size:1rem;font-weight:800;color:#0a1628;margin-bottom:4px}
.sub{font-size:.75rem;color:#4e9ecf;margin-bottom:10px;line-height:1.4}
.meta{display:flex;justify-content:space-between;font-size:.65rem;color:#7badd0;margin-bottom:6px;padding:0 2px}
.meta strong{color:#0065a8;font-weight:700}
.preview{background:#f4f8fc;border:1px solid #b8d9f0;border-radius:8px;padding:10px;text-align:left;font-family:"Noto Sans Thai",monospace,sans-serif;font-size:.72rem;color:#0a1628;line-height:1.6;max-height:140px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;margin-bottom:10px}
.btn{display:block;width:100%;background:linear-gradient(135deg,#25a9e0,#0065a8);color:#fff;border:none;border-radius:8px;padding:12px;font-size:.95rem;font-weight:800;cursor:pointer;font-family:inherit;margin-top:6px;transition:all .15s;box-shadow:0 3px 10px rgba(32,128,190,.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(32,128,190,.45)}
.btn:active{transform:translateY(0)}
.btn.big{padding:14px;font-size:1rem;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 4px 12px rgba(32,128,190,.3)}50%{box-shadow:0 8px 24px rgba(32,128,190,.55)}}
.btn.success{background:#06c755 !important;box-shadow:0 4px 12px rgba(6,199,85,.35) !important;animation:none}
.progress-wrap{height:6px;background:#e8f8ee;border-radius:6px;overflow:hidden;margin-top:14px;display:none}
.progress-wrap.show{display:block}
.progress-bar{height:100%;background:linear-gradient(90deg,#06c755,#0fa54a);width:100%;border-radius:6px;animation:countdown 1.6s linear forwards}
@keyframes countdown{from{width:100%}to{width:0%}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120px);background:#0a1628;color:#fff;padding:10px 20px;border-radius:24px;font-size:.85rem;font-weight:700;z-index:100;transition:transform .3s;box-shadow:0 6px 24px rgba(0,0,0,.25)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="card" id="card">
  <div class="icon ready" id="icon">📋</div>
  <h1 id="title">พร้อมคัดลอก</h1>
  <div class="sub" id="sub">แตะปุ่มสีฟ้าด้านล่าง — คัดลอกเสร็จจะปิดอัตโนมัติ</div>

  <div class="meta">
    <span>รูปแบบ: <strong id="fmt-label">-</strong></span>
    <span><span id="byte-count">0</span> ตัวอักษร</span>
  </div>

  <div class="preview" id="preview">กำลังประมวลผล...</div>

  <button class="btn big" id="copy-btn">📋 แตะเพื่อคัดลอก</button>

  <!-- progress bar removed: ใช้ banner ชี้ X แทน -->
</div>

<script>
'use strict';

const FMT_LABELS = {
  sku: 'เฉพาะ SKU',
  list: 'รายการ + Order ID'
};

function b64UrlDecode(b64){
  try{
    b64 = String(b64 || '').replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length % 4) b64 += '=';
    return decodeURIComponent(escape(atob(b64)));
  } catch(e){
    return null;
  }
}

function getParam(name){
  return new URLSearchParams(location.search).get(name);
}

function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#dc2626' : '#06c755';
  t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 2200);
}

function setIcon(type, mark, title, sub){
  const ic = document.getElementById('icon');
  ic.className = 'icon ' + type;
  ic.textContent = mark;
  document.getElementById('title').textContent = title;
  document.getElementById('sub').textContent = sub;
}

// (autoClose ถูกแทนที่ด้วย silentAutoClose + showBigCloseHint)

// (showManualCloseInstruction ถูกแทนที่ด้วย showBigCloseHint)

// ปิดอัตโนมัติ — ลอง 2 วินาที (เผื่อมือถือช้า) + banner หลัง 5 วินาที
function startCountdown(){
  // ลองปิด 2 วินาทีหลัง copy success — เผื่อ LIFF context พร้อมช้า
  setTimeout(silentAutoClose, 2000);
  // ลองรอบสอง ที่ 3.5 วิ (ถ้ารอบแรกพลาด)
  setTimeout(silentAutoClose, 3500);
  // ถ้าหลัง 5 วินาทียังอยู่ → แสดง banner ใหญ่ (edge case)
  setTimeout(function(){
    if(!document.hidden){
      showBigCloseHint();
    }
  }, 5000);
}

// ปิดหน้าตัวเอง — copy.html เป็น LIFF endpoint แล้ว ใช้ liff.closeWindow ได้
async function silentAutoClose(){
  // รอ liff.init ครบ (สูงสุด 2 วินาที — ปกติ ~200-500ms)
  if(typeof liff !== 'undefined'){
    for(let i = 0; i < 20; i++){
      if(window._liffReady) break;
      await new Promise(r => setTimeout(r, 100));
    }
  }
  // เรียก liff.closeWindow (LIFF endpoint สมบูรณ์แล้ว ทำงานได้แน่)
  if(typeof liff !== 'undefined' && liff.isInClient && liff.isInClient() && liff.closeWindow){
    try{ liff.closeWindow(); return; } catch(e){ console.warn('closeWindow:', e); }
  }
  // Fallback: ถ้าไม่ได้อยู่ใน LIFF (เปิดผ่าน browser ปกติ) — ลอง window.close
  try{ window.close(); } catch(e){}
}

// แสดง banner ใหญ่ชี้ปุ่ม X — honest UX
function showBigCloseHint(){
  if(document.getElementById('big-hint')) return;
  const hint = document.createElement('div');
  hint.id = 'big-hint';
  hint.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#06c755;color:#fff;padding:14px 16px;z-index:200;font-size:.95rem;font-weight:800;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:slideDown .3s ease;display:flex;align-items:center;justify-content:center;gap:8px';
  hint.innerHTML = '<span>แตะปุ่ม <strong style="background:rgba(255,255,255,0.25);padding:2px 8px;border-radius:4px">✕</strong> ด้านบนเพื่อกลับแชต LINE</span><span style="font-size:1.4rem">👆</span>';
  document.body.appendChild(hint);
  const style = document.createElement('style');
  style.textContent = '@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}';
  document.head.appendChild(style);
}

async function doCopy(text){
  if(!text){
    setIcon('error', '!', 'ไม่มีข้อมูล', 'URL ไม่ถูกต้องหรือว่างเปล่า');
    return false;
  }

  const btn = document.getElementById('copy-btn');

  // วิธี 1: modern clipboard API
  if(navigator.clipboard && navigator.clipboard.writeText){
    try{
      await navigator.clipboard.writeText(text);
      onCopySuccess();
      return true;
    } catch(err){
      console.warn('clipboard.writeText failed:', err);
    }
  }

  // วิธี 2: fallback execCommand
  try{
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    ta.style.top = '0';
    ta.style.left = '0';
    document.body.appendChild(ta);
    ta.select();
    ta.setSelectionRange(0, text.length);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if(ok){
      onCopySuccess();
      return true;
    }
  } catch(e){ console.warn('execCommand failed:', e); }

  // ทั้ง 2 วิธีไม่ได้
  setIcon('warn', '!', 'คัดลอกไม่สำเร็จ', 'ลองแตะปุ่มใหม่อีกครั้ง');
  showToast('แตะปุ่มอีกครั้ง', true);
  return false;
}

function onCopySuccess(){
  setIcon('success', '\u2713', 'คัดลอกเรียบร้อย', 'กำลังกลับไปแชต LINE...');
  showToast('✓ คัดลอกแล้ว');
  const btn = document.getElementById('copy-btn');
  btn.className = 'btn success';
  btn.textContent = '✓ คัดลอกแล้ว — แตะอีกครั้งได้';
  startCountdown();
}

(async function init(){
  // ====== โหมดใหม่: ?sku=XXX → copy เลข SKU เดี่ยว (สำหรับ Flex tap-to-copy) ======
  const skuParam = getParam('sku');
  if(skuParam){
    const sku = String(skuParam).replace(/\s+/g, '').trim();
    document.getElementById('fmt-label').textContent = 'SKU';
    document.getElementById('preview').textContent = sku;
    document.getElementById('byte-count').textContent = sku.length;
    window._copyText = sku;
    document.getElementById('copy-btn').addEventListener('click', () => doCopy(window._copyText));

    // Init LIFF เพื่อให้ closeWindow พร้อม
    if(typeof liff !== 'undefined'){
      try{
        await liff.init({ liffId: '2010211018-4Zqj1MmB' });
        window._liffReady = true;
      } catch(e){ window._liffReady = true; }
    } else { window._liffReady = true; }

    // Auto-copy ทันที
    if(navigator.clipboard && navigator.clipboard.writeText){
      try{ await navigator.clipboard.writeText(sku); onCopySuccess(); }
      catch(e){ console.warn('auto-copy sku failed:', e); }
    }
    return;
  }

  // ====== โหมดเดิม: ?t=base64 → copy ออเดอร์ทั้งบิล ======
  const fmt = getParam('fmt') || 'sku';
  const t   = getParam('t')   || '';
  const decoded = b64UrlDecode(t);

  document.getElementById('fmt-label').textContent = FMT_LABELS[fmt] || fmt;

  if(decoded === null){
    setIcon('error', '!', 'ข้อมูลผิดพลาด', 'ถอดรหัส URL ไม่
</html>
