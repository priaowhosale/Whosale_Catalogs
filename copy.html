<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>คัดลอกออเดอร์ — เปรียว คอสเมติกส์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Noto Sans Thai",sans-serif}
body{background:#f4f8fc;color:#0a1628;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:28px 24px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(32,128,190,.15);text-align:center}
.icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:32px;font-weight:bold}
.icon.success{background:#e8f8ee;color:#06c755}
.icon.warn{background:#fef3c7;color:#d97706}
.icon.error{background:#fee2e2;color:#dc2626}
h1{font-size:1.15rem;font-weight:800;color:#0a1628;margin-bottom:6px}
.sub{font-size:.82rem;color:#4e9ecf;margin-bottom:18px;line-height:1.5}
.preview{background:#f4f8fc;border:1px solid #b8d9f0;border-radius:10px;padding:14px;text-align:left;font-family:"Noto Sans Thai",monospace,sans-serif;font-size:.78rem;color:#0a1628;line-height:1.7;max-height:260px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;margin-bottom:14px}
.btn{display:block;width:100%;background:linear-gradient(135deg,#25a9e0,#0065a8);color:#fff;border:none;border-radius:10px;padding:12px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;transition:all .15s}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(32,128,190,.35)}
.btn:active{transform:translateY(0)}
.btn.alt{background:#fff;color:#2080BE;border:1.5px solid #2080BE}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-120px);background:#0a1628;color:#fff;padding:10px 18px;border-radius:24px;font-size:.85rem;font-weight:600;z-index:100;transition:transform .3s;box-shadow:0 6px 24px rgba(0,0,0,.25)}
.toast.show{transform:translateX(-50%) translateY(0)}
.tip{font-size:.72rem;color:#4e9ecf;margin-top:14px;line-height:1.5}
.meta{display:flex;justify-content:space-between;font-size:.7rem;color:#7badd0;margin-bottom:10px}
.meta strong{color:#0065a8;font-weight:700}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="card" id="card">
  <div class="icon success" id="icon">✓</div>
  <h1 id="title">คัดลอกเรียบร้อย</h1>
  <div class="sub" id="sub">เนื้อหาอยู่ใน clipboard แล้ว — paste ที่ไหนก็ได้</div>

  <div class="meta">
    <span>รูปแบบ: <strong id="fmt-label">-</strong></span>
    <span><span id="byte-count">0</span> ตัวอักษร</span>
  </div>

  <div class="preview" id="preview">กำลังประมวลผล...</div>

  <button class="btn" id="copy-btn">คัดลอกอีกครั้ง</button>
  <button class="btn alt" onclick="window.close()">ปิดหน้าต่าง</button>

  <div class="tip">หากปิดอัตโนมัติไม่ได้ ปิด tab นี้ด้วยตัวเองได้เลยค่ะ</div>
</div>

<script>
'use strict';

const FMT_LABELS = {
  sku: 'เฉพาะ SKU',
  list: 'รายการ + Order ID'
};

// URL-safe base64 decode → UTF-8
function b64UrlDecode(b64){
  try{
    b64 = String(b64 || '').replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length % 4) b64 += '=';
    return decodeURIComponent(escape(atob(b64)));
  } catch(e){
    return null;
  }
}

function getParam(name){
  const m = new URLSearchParams(location.search);
  return m.get(name);
}

function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#dc2626' : '#0a1628';
  t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 2500);
}

function setIcon(type, mark, title, sub){
  const ic = document.getElementById('icon');
  ic.className = 'icon ' + type;
  ic.textContent = mark;
  document.getElementById('title').textContent = title;
  document.getElementById('sub').textContent = sub;
}

async function doCopy(text){
  if(!text){
    setIcon('error', '!', 'ไม่มีข้อมูล', 'URL ไม่ถูกต้องหรือว่างเปล่า');
    return false;
  }
  try{
    await navigator.clipboard.writeText(text);
    setIcon('success', '\u2713', 'คัดลอกเรียบร้อย', 'เนื้อหาอยู่ใน clipboard แล้ว — paste ที่ไหนก็ได้');
    showToast('คัดลอกแล้ว');
    return true;
  } catch(err){
    // Fallback สำหรับ browser เก่า / clipboard API ไม่อนุญาต
    try{
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if(ok){
        setIcon('success', '\u2713', 'คัดลอกเรียบร้อย', 'ใช้วิธี fallback');
        showToast('คัดลอกแล้ว');
        return true;
      }
    } catch(e2){}
    setIcon('warn', '!', 'คัดลอกอัตโนมัติไม่สำเร็จ', 'แตะปุ่ม "คัดลอกอีกครั้ง" หรือเลือกข้อความเองจากกล่องด้านล่าง');
    showToast('แตะปุ่มคัดลอกอีกครั้ง', true);
    return false;
  }
}

(function init(){
  const fmt = getParam('fmt') || 'sku';
  const t   = getParam('t')   || '';
  const decoded = b64UrlDecode(t);

  document.getElementById('fmt-label').textContent = FMT_LABELS[fmt] || fmt;

  if(decoded === null){
    setIcon('error', '!', 'ข้อมูลผิดพลาด', 'ถอดรหัส URL ไม่สำเร็จ');
    document.getElementById('preview').textContent = '(ไม่มีข้อมูล)';
    return;
  }

  document.getElementById('preview').textContent = decoded;
  document.getElementById('byte-count').textContent = decoded.length;

  // กดอัตโนมัติเลย (ปุ่ม retry สำหรับ browser ที่ต้อง user gesture)
  doCopy(decoded);

  document.getElementById('copy-btn').addEventListener('click', () => doCopy(decoded));
})();
</script>

</body>
</html>
