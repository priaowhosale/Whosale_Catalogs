<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>คัดลอกออเดอร์ — เปรียว คอสเมติกส์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Noto Sans Thai",sans-serif}
body{background:#f4f8fc;color:#0a1628;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
.card{background:#fff;border-radius:16px;padding:24px 20px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(32,128,190,.15);text-align:center}
.icon{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:30px;font-weight:bold}
.icon.success{background:#e8f8ee;color:#06c755}
.icon.warn{background:#fef3c7;color:#d97706}
.icon.error{background:#fee2e2;color:#dc2626}
.icon.ready{background:#e6f1fb;color:#2080BE}
h1{font-size:1.1rem;font-weight:800;color:#0a1628;margin-bottom:6px}
.sub{font-size:.82rem;color:#4e9ecf;margin-bottom:14px;line-height:1.5}
.meta{display:flex;justify-content:space-between;font-size:.7rem;color:#7badd0;margin-bottom:8px;padding:0 2px}
.meta strong{color:#0065a8;font-weight:700}
.preview{background:#f4f8fc;border:1px solid #b8d9f0;border-radius:10px;padding:12px;text-align:left;font-family:"Noto Sans Thai",monospace,sans-serif;font-size:.78rem;color:#0a1628;line-height:1.7;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;margin-bottom:14px}
.btn{display:block;width:100%;background:linear-gradient(135deg,#25a9e0,#0065a8);color:#fff;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px;transition:all .15s;box-shadow:0 4px 12px rgba(32,128,190,.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(32,128,190,.45)}
.btn:active{transform:translateY(0)}
.btn.big{padding:18px;font-size:1.05rem;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 4px 12px rgba(32,128,190,.3)}50%{box-shadow:0 8px 24px rgba(32,128,190,.55)}}
.btn.success{background:#06c755 !important;box-shadow:0 4px 12px rgba(6,199,85,.35) !important;animation:none}
.progress-wrap{height:6px;background:#e8f8ee;border-radius:6px;overflow:hidden;margin-top:14px;display:none}
.progress-wrap.show{display:block}
.progress-bar{height:100%;background:linear-gradient(90deg,#06c755,#0fa54a);width:100%;border-radius:6px;animation:countdown 1.6s linear forwards}
@keyframes countdown{from{width:100%}to{width:0%}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120px);background:#0a1628;color:#fff;padding:10px 20px;border-radius:24px;font-size:.85rem;font-weight:700;z-index:100;transition:transform .3s;box-shadow:0 6px 24px rgba(0,0,0,.25)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="card" id="card">
  <div class="icon ready" id="icon">📋</div>
  <h1 id="title">พร้อมคัดลอก</h1>
  <div class="sub" id="sub">แตะปุ่มสีฟ้าด้านล่าง — คัดลอกเสร็จจะปิดอัตโนมัติ</div>

  <div class="meta">
    <span>รูปแบบ: <strong id="fmt-label">-</strong></span>
    <span><span id="byte-count">0</span> ตัวอักษร</span>
  </div>

  <div class="preview" id="preview">กำลังประมวลผล...</div>

  <button class="btn big" id="copy-btn">📋 แตะเพื่อคัดลอก</button>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar"></div>
  </div>
</div>

<script>
'use strict';

const FMT_LABELS = {
  sku: 'เฉพาะ SKU',
  list: 'รายการ + Order ID'
};

function b64UrlDecode(b64){
  try{
    b64 = String(b64 || '').replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length % 4) b64 += '=';
    return decodeURIComponent(escape(atob(b64)));
  } catch(e){
    return null;
  }
}

function getParam(name){
  return new URLSearchParams(location.search).get(name);
}

function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#dc2626' : '#06c755';
  t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 2200);
}

function setIcon(type, mark, title, sub){
  const ic = document.getElementById('icon');
  ic.className = 'icon ' + type;
  ic.textContent = mark;
  document.getElementById('title').textContent = title;
  document.getElementById('sub').textContent = sub;
}

// ปิดหน้าตัวเอง — ลองหลายวิธีตามลำดับ
async function autoClose(){
  // 1. รอ liff.init() เสร็จก่อน (สูงสุด 1.5 วินาที)
  if(typeof liff !== 'undefined'){
    for(let i = 0; i < 15; i++){
      if(window._liffReady) break;
      await new Promise(r => setTimeout(r, 100));
    }
  }

  // 2. LIFF closeWindow (ดีที่สุด ถ้าอยู่ใน LINE in-app browser)
  if(typeof liff !== 'undefined' && liff.closeWindow){
    try{
      liff.closeWindow();
      // กันเหนียว — ถ้า closeWindow ไม่ทำงานจริง รอ 500ms แล้ว fallback
      await new Promise(r => setTimeout(r, 500));
    } catch(e){ console.warn('liff.closeWindow failed:', e); }
  }

  // 3. ถ้ายังไม่ปิด ลอง LINE deep link (เด้งกลับ LINE app)
  try{
    window.location.href = 'line://nv/chats';
    return;
  } catch(e){}

  // 4. window.close()
  try{ window.close(); } catch(e){}

  // 5. history.back()
  if(window.history.length > 1){
    try{ window.history.back(); return; } catch(e){}
  }

  // 6. สุดท้าย — เปิด LINE หน้าหลัก
  window.location.href = 'https://line.me/R/';
}

// แสดง manual instruction ถ้าผ่านไปเกิน 3 วินาทียังไม่ปิด
function showManualCloseInstruction(){
  const tip = document.createElement('div');
  tip.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#dc2626;color:#fff;padding:12px 18px;border-radius:24px;font-size:.85rem;font-weight:700;z-index:200;box-shadow:0 6px 20px rgba(220,38,38,.4);text-align:center;max-width:90vw';
  tip.innerHTML = '👆 แตะปุ่ม X มุมขวาบนเพื่อกลับ LINE ได้เลยค่ะ';
  document.body.appendChild(tip);
}

// แสดง countdown ก่อน auto-close + เตือนถ้าค้างเกิน 3 วินาที
function startCountdown(){
  document.getElementById('progress-wrap').classList.add('show');
  setTimeout(autoClose, 1600);
  // ถ้าผ่าน 3 วินาที (1.6 countdown + ~1.5 closeWindow attempt) แล้วยังอยู่ → แสดงคำแนะนำ manual
  setTimeout(function(){
    if(!document.hidden){
      showManualCloseInstruction();
    }
  }, 3500);
}

async function doCopy(text){
  if(!text){
    setIcon('error', '!', 'ไม่มีข้อมูล', 'URL ไม่ถูกต้องหรือว่างเปล่า');
    return false;
  }

  const btn = document.getElementById('copy-btn');

  // วิธี 1: modern clipboard API
  if(navigator.clipboard && navigator.clipboard.writeText){
    try{
      await navigator.clipboard.writeText(text);
      onCopySuccess();
      return true;
    } catch(err){
      console.warn('clipboard.writeText failed:', err);
    }
  }

  // วิธี 2: fallback execCommand
  try{
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    ta.style.top = '0';
    ta.style.left = '0';
    document.body.appendChild(ta);
    ta.select();
    ta.setSelectionRange(0, text.length);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if(ok){
      onCopySuccess();
      return true;
    }
  } catch(e){ console.warn('execCommand failed:', e); }

  // ทั้ง 2 วิธีไม่ได้
  setIcon('warn', '!', 'คัดลอกไม่สำเร็จ', 'ลองแตะปุ่มใหม่อีกครั้ง');
  showToast('แตะปุ่มอีกครั้ง', true);
  return false;
}

function onCopySuccess(){
  setIcon('success', '\u2713', 'คัดลอกเรียบร้อย', 'กำลังกลับไปแชต LINE...');
  showToast('✓ คัดลอกแล้ว — กำลังปิดหน้า');
  const btn = document.getElementById('copy-btn');
  btn.className = 'btn success';
  btn.textContent = '✓ คัดลอกแล้ว — กลับแชตใน 1.5 วินาที';
  btn.disabled = true;
  startCountdown();
}

(function init(){
  const fmt = getParam('fmt') || 'sku';
  const t   = getParam('t')   || '';
  const decoded = b64UrlDecode(t);

  document.getElementById('fmt-label').textContent = FMT_LABELS[fmt] || fmt;

  if(decoded === null){
    setIcon('error', '!', 'ข้อมูลผิดพลาด', 'ถอดรหัส URL ไม่สำเร็จ');
    document.getElementById('preview').textContent = '(ไม่มีข้อมูล)';
    return;
  }

  document.getElementById('preview').textContent = decoded;
  document.getElementById('byte-count').textContent = decoded.length;
  window._copyText = decoded;

  // ผูก click handler
  document.getElementById('copy-btn').addEventListener('click', () => doCopy(window._copyText));

  // ลอง auto-copy ตอนโหลด — ถ้าได้จะ auto-close เลย
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(decoded).then(onCopySuccess).catch(() => {
      // ไม่ได้ก็ไม่เป็นไร รอ user แตะปุ่ม
    });
  }

  // Init LIFF SDK สำหรับ closeWindow — ตั้ง flag เมื่อพร้อม
  if(typeof liff !== 'undefined'){
    try{
      liff.init({ liffId: '2010211018-V4JAFUOl' })
        .then(function(){ window._liffReady = true; })
        .catch(function(e){ console.warn('liff.init failed:', e); window._liffReady = true; });
    } catch(e){ window._liffReady = true; }
  } else {
    window._liffReady = true;
  }
})();
</script>

</body>
</html>
